name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run verifier tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run green test
        run: npm run test:green

      - name: Run yellow test
        run: npm run test:yellow

      - name: Run red test
        run: npm run test:red

      - name: Run gray test
        run: npm run test:gray

      - name: Run UI result card test
        run: npm run test:ui
